name: Deploy SmartUp ERP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 76.13.244.60 >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -o StrictHostKeyChecking=yes root@76.13.244.60 \
            "cd /var/www/smartup-erp && git fetch --all && git reset --hard origin/main && npm install --production && npm run build && PORT=3001 pm2 restart smartup-erp || PORT=3001 pm2 start npm --name smartup-erp -- start && pm2 save && nginx -t && systemctl reload nginx"
